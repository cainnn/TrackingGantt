# Nginx configuration for Gantt App
# Copy this to /etc/nginx/sites-available/gantt-app

# Upstream configuration for Next.js application
upstream gantt_backend {
    server localhost:3000;
    keepalive 64;
}

# HTTP Server - Redirect to HTTPS (if SSL is enabled)
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Redirect all HTTP traffic to HTTPS
    # Uncomment the lines below if you have SSL configured
    # return 301 https://$server_name$request_uri;

    # Or serve directly on HTTP (for development or without SSL)
    location / {
        proxy_pass http://gantt_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Gantt static library files (cache for longer)
    location /lib/gantt/ {
        proxy_pass http://gantt_backend/lib/gantt/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache static assets
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Next.js static files
    location /_next/static/ {
        proxy_pass http://gantt_backend/_next/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache static assets
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

